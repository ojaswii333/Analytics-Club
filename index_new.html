<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Club | Turning Data Into Insight</title>
    <!-- Modern Tech Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Sora:wght@400;600;700&family=Space+Grotesk:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/Analytics-Club/css/global.css">
    <link rel="stylesheet" href="/Analytics-Club/css/home_new.css">
</head>

<body>
    <div id="preloader">

        <div class="loader-content">

            <img src="/Analytics-Club/assets/logo.png" class="loader-logo" alt="Analytics Club Logo">

            <div class="loader-bar">
                <div class="loader-progress"></div>
            </div>

        </div>

    </div>
    <header id="navbar"></header>
    <section id="hero">

        <div class="hero-container">

            <div class="hero-text">
                <h1>Analytics Club</h1>
                <p>Turning Data Into Insight</p>
                <button class="join-btn">Join Us</button>
            </div>

            <div class="hero-visual"></div>

        </div>

    </section>
    <section id="event-countdown" class="section">

        <div class="container">

            <h2 class="section-title">Next Event Starts In</h2>
            <span class="section-tag">Upcoming Event</span>
            <div class="countdown">

                <div class="time-box">
                    <span id="days">00</span>
                    <p>Days</p>
                </div>

                <div class="time-box">
                    <span id="hours">00</span>
                    <p>Hours</p>
                </div>

                <div class="time-box">
                    <span id="minutes">00</span>
                    <p>Minutes</p>
                </div>

                <div class="time-box">
                    <span id="seconds">00</span>
                    <p>Seconds</p>
                </div>

            </div>

        </div>

    </section>
    <footer id="footer"></footer>
</body>
<script src="/Analytics-Club/js/components_new.js"></script>
<script src="/Analytics-Club/js/home_new.js"></script>

</html>
